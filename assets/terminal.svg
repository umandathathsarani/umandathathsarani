<svg width="100%" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes type1 { 0%, 5% { width: 0; } 25%, 100% { width: 100%; } }
    @keyframes type2 { 0%, 25% { width: 0; } 45%, 100% { width: 100%; } }
    @keyframes type3 { 0%, 45% { width: 0; } 65%, 100% { width: 100%; } }
    @keyframes type4 { 0%, 65% { width: 0; } 85%, 100% { width: 100%; } }
    @keyframes type5 { 0%, 85% { width: 0; } 95%, 100% { width: 100%; } }
    
    @keyframes matrixFall {
      0% { transform: translateY(-100%); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(400px); opacity: 0; }
    }

    .matrix-col { font-family: 'Fira Code', monospace; font-size: 14px; fill: #00FF87; opacity: 0.15; font-weight: bold; }
    .fall-1 { animation: matrixFall 4s linear infinite; }
    .fall-2 { animation: matrixFall 3s linear infinite 1s; }
    .fall-3 { animation: matrixFall 5s linear infinite 2s; }
    
    .term-window { fill: rgba(10, 10, 20, 0.85); stroke: #7B68EE; stroke-width: 1.5; rx: 8; }
    .term-top { fill: rgba(123, 104, 238, 0.15); rx: 8; }
    
    .cursor { animation: blink 1s step-end infinite; }
    
    .line {
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      fill: #a5b4fc;
      white-space: pre;
      overflow: hidden;
    }

    .t-user { fill: #8be9fd; font-weight: bold; }
    .t-dir { fill: #7B68EE; font-weight: bold; }
    .t-cmd { fill: #50fa7b; }
    .t-arg { fill: #ffb86c; }
    .t-success { fill: #00FF87; filter: url(#glow); }
    .t-sys { fill: #6272a4; }

    /* Typing masks */
    .mask1 { animation: type1 10s steps(40, end) infinite; }
    .mask2 { animation: type2 10s steps(40, end) infinite; }
    .mask3 { animation: type3 10s steps(40, end) infinite; }
    .mask4 { animation: type4 10s steps(40, end) infinite; }
    .mask5 { animation: type5 10s steps(40, end) infinite; }
  </style>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Matrix Background Effect -->
  <g class="matrix-col">
    <text x="50" y="0" class="fall-1">101001110010101011101010</text>
    <text x="150" y="0" class="fall-2" transform="rotate(90 150 0)">011001010110101101</text>
    <text x="250" y="0" class="fall-3" transform="rotate(90 250 0)">11101010010101110</text>
    <text x="950" y="0" class="fall-1" transform="rotate(90 950 0)">01011100110010101</text>
    <text x="1050" y="0" class="fall-2" transform="rotate(90 1050 0)">11010010001011110</text>
    <text x="1150" y="0" class="fall-3" transform="rotate(90 1150 0)">00101010011101010</text>
  </g>

  <!-- Terminal Window -->
  <g transform="translate(100, 30)">
    <rect x="0" y="0" width="1000" height="340" class="term-window"/>
    <rect x="0" y="0" width="1000" height="30" class="term-top" style="border-bottom-left-radius:0; border-bottom-right-radius:0;"/>
    
    <!-- Window Controls -->
    <circle cx="20" cy="15" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="15" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="15" r="6" fill="#27c93f"/>
    <text x="500" y="20" font-family="'Inter', sans-serif" font-size="12" fill="#8be9fd" text-anchor="middle" font-weight="bold">AI_TERMINAL - bash - 120x35</text>

    <!-- ASCII Art (Boot Sequence) -->
    <text x="30" y="70" class="line t-sys">Initializing AI Core [████████████████████] 100%</text>
    <text x="30" y="90" class="line t-sys">Loading Neural Networks... OK</text>
    <text x="30" y="110" class="line t-sys">Establishing Uplink... OK</text>

    <!-- Interactive Terminal Lines with Typing Effect -->
    <!-- Line 1 -->
    <g>
      <clipPath id="c1"><rect width="1000" height="20" class="mask1"/></clipPath>
      <g transform="translate(30, 145)" clip-path="url(#c1)">
        <text y="0" class="line">
          <tspan class="t-user">umanda@ai-station</tspan>:<tspan class="t-dir">~/portfolio</tspan>$ <tspan class="t-cmd">python3</tspan> <tspan class="t-arg">init_brain.py --deploy</tspan>
        </text>
      </g>
    </g>

    <!-- Line 2 -->
    <g>
      <clipPath id="c2"><rect width="1000" height="20" class="mask2"/></clipPath>
      <g transform="translate(30, 165)" clip-path="url(#c2)">
        <text y="0" class="line t-sys">[INFO] Loading pre-trained weights from local storage...</text>
      </g>
    </g>

    <!-- Line 3 -->
    <g>
      <clipPath id="c3"><rect width="1000" height="40" class="mask3"/></clipPath>
      <g transform="translate(30, 185)" clip-path="url(#c3)">
        <text y="0" class="line t-sys">[INFO] Connecting to external database clusters...</text>
        <text y="20" class="line t-success">SYSTEM ONLINE. READY FOR INSTRUCTIONS.</text>
      </g>
    </g>

    <!-- Line 4 -->
    <g>
      <clipPath id="c4"><rect width="1000" height="20" class="mask4"/></clipPath>
      <g transform="translate(30, 225)" clip-path="url(#c4)">
        <text y="0" class="line">
          <tspan class="t-user">umanda@ai-station</tspan>:<tspan class="t-dir">~/portfolio</tspan>$ <tspan class="t-cmd">whoami</tspan>
        </text>
      </g>
    </g>

    <!-- Line 5 -->
    <g>
      <clipPath id="c5"><rect width="1000" height="60" class="mask5"/></clipPath>
      <g transform="translate(30, 245)" clip-path="url(#c5)">
        <text y="0" class="line t-success">> Umanda Thathsarani</text>
        <text y="20" class="line t-success">> Passionate AI Engineer &amp; Full Stack Developer.</text>
        <text y="40" class="line">
          <tspan class="t-user">umanda@ai-station</tspan>:<tspan class="t-dir">~/portfolio</tspan>$ <tspan class="cursor">█</tspan>
        </text>
      </g>
    </g>
    
  </g>
</svg>