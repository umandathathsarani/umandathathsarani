<svg width="100%" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#11112b"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B68EE"/>
      <stop offset="50%" stop-color="#00BFFF"/>
      <stop offset="100%" stop-color="#00FFFF"/>
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Planet Texture -->
    <radialGradient id="planet-grad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="50%" stop-color="#00BFFF"/>
      <stop offset="100%" stop-color="#7B68EE"/>
    </radialGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7B68EE" stroke-width="0.5" stroke-opacity="0.2"/>
    </pattern>

    <mask id="reveal-mask">
      <rect class="mask-rect" x="0" y="0" width="1200" height="400" fill="white" />
    </mask>
  </defs>

  <style>
    /* CSS Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes typingReveal {
      0% { transform: scaleX(0); }
      100% { transform: scaleX(1); }
    }
    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }

    /* Element Styles */
    .bg-grid { fill: url(#grid); }
    .floating { animation: float 6s ease-in-out infinite; }
    .pulsing { animation: pulse 4s ease-in-out infinite; }
    .spinning-slow { transform-origin: center; animation: spin 40s linear infinite; }
    .spinning-reverse { transform-origin: center; animation: spin 30s linear infinite reverse; }
    .star { animation: twinkle 3s infinite ease-in-out; }
    .star-2 { animation: twinkle 4s infinite ease-in-out 1s; }
    .star-3 { animation: twinkle 5s infinite ease-in-out 2s; }
    
    .mask-rect {
      transform-origin: left center;
      transform: scaleX(0);
      animation: typingReveal 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.5s;
    }
    
    .net-line {
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: dash 3s ease-out forwards;
    }

    .title {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-weight: 800;
      font-size: 52px;
      fill: url(#accent-grad);
      filter: url(#glow);
    }
    
    .subtitle {
      font-family: 'Inter', 'Fira Code', monospace;
      font-weight: 500;
      font-size: 24px;
      fill: #8be9fd;
    }

    .text-body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-weight: 400;
      font-size: 18px;
      fill: #a5b4fc;
    }

    .hud-box {
      fill: rgba(123, 104, 238, 0.05);
      stroke: rgba(123, 104, 238, 0.3);
      stroke-width: 1.5;
      rx: 12px;
      backdrop-filter: blur(10px);
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)"/>
  <rect width="1200" height="400" class="bg-grid"/>

  <!-- Stars / Particles -->
  <g fill="white">
    <circle cx="100" cy="50" r="1.5" class="star" />
    <circle cx="250" cy="120" r="1" class="star-2" />
    <circle cx="450" cy="80" r="2" class="star-3" />
    <circle cx="650" cy="180" r="1.5" class="star" />
    <circle cx="850" cy="60" r="1" class="star-2" />
    <circle cx="1050" cy="150" r="2" class="star-3" />
    <circle cx="1150" cy="40" r="1.5" class="star" />
    <circle cx="50" cy="250" r="2" class="star-2" />
    <circle cx="300" cy="350" r="1" class="star-3" />
    <circle cx="600" cy="320" r="2" class="star" />
    <circle cx="900" cy="380" r="1.5" class="star-2" />
  </g>

  <!-- Neural Network / Orbit Lines -->
  <g stroke="url(#accent-grad)" stroke-width="1.5" opacity="0.3" class="spinning-slow" style="transform-origin: 950px 200px;">
    <circle cx="950" cy="200" r="120" fill="none" stroke-dasharray="10 5" />
    <circle cx="950" cy="200" r="160" fill="none" />
    <circle cx="950" cy="200" r="220" fill="none" stroke-dasharray="4 8" />
  </g>

  <!-- Glowing Planet / Core -->
  <g class="floating">
    <!-- Outer Glow -->
    <circle cx="950" cy="200" r="70" fill="url(#planet-grad)" filter="url(#glow-heavy)" opacity="0.4" class="pulsing"/>
    <!-- Core -->
    <circle cx="950" cy="200" r="60" fill="url(#planet-grad)"/>
    
    <!-- Tech Rings -->
    <g class="spinning-reverse" style="transform-origin: 950px 200px;">
      <path d="M 870 200 A 80 80 0 0 1 1030 200" fill="none" stroke="#00FFFF" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
      <path d="M 860 200 A 90 90 0 0 0 1040 200" fill="none" stroke="#7B68EE" stroke-width="2" stroke-dasharray="15 10" filter="url(#glow)"/>
    </g>
  </g>

  <!-- Neural Network Nodes inside HUD -->
  <g class="floating">
    <path d="M 890 220 L 930 170 L 980 180 L 1000 240 L 940 260 Z" fill="none" stroke="#00FFFF" stroke-width="1.5" class="net-line" filter="url(#glow)"/>
    <circle cx="890" cy="220" r="4" fill="#FFFFFF" filter="url(#glow)"/>
    <circle cx="930" cy="170" r="5" fill="#FFFFFF" filter="url(#glow)"/>
    <circle cx="980" cy="180" r="3" fill="#FFFFFF" filter="url(#glow)"/>
    <circle cx="1000" cy="240" r="4.5" fill="#FFFFFF" filter="url(#glow)"/>
    <circle cx="940" cy="260" r="3.5" fill="#FFFFFF" filter="url(#glow)"/>
  </g>

  <!-- Main Content wrapped in a typing mask -->
  <g mask="url(#reveal-mask)">
    <!-- HUD Box -->
    <rect x="50" y="50" width="700" height="300" class="hud-box"/>
    
    <!-- Top Bar of HUD -->
    <rect x="50" y="50" width="700" height="35" fill="rgba(123, 104, 238, 0.15)" rx="12" style="border-bottom-left-radius: 0; border-bottom-right-radius: 0;"/>
    <circle cx="75" cy="67.5" r="5" fill="#ff5f56"/>
    <circle cx="95" cy="67.5" r="5" fill="#ffbd2e"/>
    <circle cx="115" cy="67.5" r="5" fill="#27c93f"/>
    <text x="140" y="72.5" font-family="monospace" font-size="12" fill="#8be9fd" opacity="0.8">sys.ai.research_station.exe</text>

    <!-- Typography -->
    <text x="90" y="145" class="title">AI RESEARCH STATION</text>
    
    <text x="90" y="195" font-family="Segoe UI" font-weight="600" font-size="32" fill="white">
      Umanda Thathsarani
    </text>

    <!-- Badges -->
    <g transform="translate(90, 220)">
      <rect x="0" y="0" width="165" height="28" rx="14" fill="#7B68EE" opacity="0.2"/>
      <rect x="0" y="0" width="165" height="28" rx="14" fill="none" stroke="#7B68EE" stroke-width="1"/>
      <text x="82.5" y="19" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#a5b4fc" text-anchor="middle">Artificial Intelligence</text>
    </g>

    <g transform="translate(265, 220)">
      <rect x="0" y="0" width="140" height="28" rx="14" fill="#00BFFF" opacity="0.2"/>
      <rect x="0" y="0" width="140" height="28" rx="14" fill="none" stroke="#00BFFF" stroke-width="1"/>
      <text x="70" y="19" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#8be9fd" text-anchor="middle">Machine Learning</text>
    </g>

    <g transform="translate(415, 220)">
      <rect x="0" y="0" width="135" height="28" rx="14" fill="#00FFFF" opacity="0.2"/>
      <rect x="0" y="0" width="135" height="28" rx="14" fill="none" stroke="#00FFFF" stroke-width="1"/>
      <text x="67.5" y="19" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#00FFFF" text-anchor="middle">Computer Vision</text>
    </g>

    <text x="90" y="285" class="subtitle">
      > Building intelligent systems...
    </text>

    <!-- Cursor -->
    <rect x="420" y="265" width="12" height="24" fill="#8be9fd" class="pulsing"/>
  </g>

</svg>