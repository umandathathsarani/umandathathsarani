<svg width="100%" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#11112b"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-heavy">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes dataMove {
      0% { stroke-dashoffset: 100; opacity: 0; }
      50% { opacity: 1; }
      100% { stroke-dashoffset: -100; opacity: 0; }
    }
    @keyframes pulseNode {
      0%, 100% { fill: rgba(123, 104, 238, 0.4); r: 8; }
      50% { fill: rgba(0, 255, 255, 1); r: 12; filter: drop-shadow(0 0 10px #00FFFF); }
    }
    
    .conn-line {
      stroke: rgba(123, 104, 238, 0.2);
      stroke-width: 1.5;
    }
    
    .data-flow {
      stroke: #00FFFF;
      stroke-width: 2.5;
      stroke-dasharray: 20 80;
      animation: dataMove 2s linear infinite;
      filter: url(#glow);
    }
    .data-flow-2 {
      stroke: #7B68EE;
      stroke-width: 2.5;
      stroke-dasharray: 15 85;
      animation: dataMove 2.5s linear infinite 0.5s;
      filter: url(#glow);
    }

    .node { fill: #0a0a20; stroke: #7B68EE; stroke-width: 2; transition: all 0.3s; }
    .node-active { animation: pulseNode 3s infinite; }
    .node-active-2 { animation: pulseNode 3.5s infinite 1s; }
    
    .layer-label { font-family: 'Inter', monospace; font-size: 12px; fill: #8be9fd; font-weight: bold; letter-spacing: 2px; }
  </style>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <g transform="translate(100, 50)">
    
    <!-- Input Layer -->
    <text x="50" y="-10" class="layer-label" text-anchor="middle">INPUT</text>
    <g id="input-layer">
      <!-- Connections to Hidden 1 -->
      <path d="M 50 60 L 250 30" class="conn-line"/>
      <path d="M 50 60 L 250 150" class="conn-line"/>
      <path d="M 50 60 L 250 270" class="conn-line"/>
      <path d="M 50 60 L 250 30" class="data-flow"/>
      
      <path d="M 50 150 L 250 30" class="conn-line"/>
      <path d="M 50 150 L 250 150" class="conn-line"/>
      <path d="M 50 150 L 250 270" class="conn-line"/>
      <path d="M 50 150 L 250 150" class="data-flow-2"/>

      <path d="M 50 240 L 250 30" class="conn-line"/>
      <path d="M 50 240 L 250 150" class="conn-line"/>
      <path d="M 50 240 L 250 270" class="conn-line"/>

      <circle cx="50" cy="60" r="10" class="node"/>
      <circle cx="50" cy="150" r="10" class="node node-active"/>
      <circle cx="50" cy="240" r="10" class="node"/>
    </g>

    <!-- Hidden Layer 1 -->
    <text x="250" y="-10" class="layer-label" text-anchor="middle">HIDDEN_1</text>
    <g id="hidden-layer-1">
      <path d="M 250 30 L 450 60" class="conn-line"/>
      <path d="M 250 30 L 450 150" class="conn-line"/>
      <path d="M 250 30 L 450 240" class="conn-line"/>
      
      <path d="M 250 150 L 450 60" class="conn-line"/>
      <path d="M 250 150 L 450 150" class="conn-line"/>
      <path d="M 250 150 L 450 240" class="conn-line"/>
      <path d="M 250 150 L 450 150" class="data-flow"/>

      <path d="M 250 270 L 450 60" class="conn-line"/>
      <path d="M 250 270 L 450 150" class="conn-line"/>
      <path d="M 250 270 L 450 240" class="conn-line"/>

      <circle cx="250" cy="30" r="10" class="node node-active-2"/>
      <circle cx="250" cy="150" r="10" class="node"/>
      <circle cx="250" cy="270" r="10" class="node"/>
    </g>

    <!-- Hidden Layer 2 -->
    <text x="450" y="-10" class="layer-label" text-anchor="middle">HIDDEN_2</text>
    <g id="hidden-layer-2">
      <path d="M 450 60 L 650 30" class="conn-line"/>
      <path d="M 450 60 L 650 150" class="conn-line"/>
      <path d="M 450 60 L 650 270" class="conn-line"/>

      <path d="M 450 150 L 650 30" class="conn-line"/>
      <path d="M 450 150 L 650 150" class="conn-line"/>
      <path d="M 450 150 L 650 270" class="conn-line"/>
      <path d="M 450 150 L 650 150" class="data-flow-2"/>

      <path d="M 450 240 L 650 30" class="conn-line"/>
      <path d="M 450 240 L 650 150" class="conn-line"/>
      <path d="M 450 240 L 650 270" class="conn-line"/>

      <circle cx="450" cy="60" r="10" class="node"/>
      <circle cx="450" cy="150" r="10" class="node node-active"/>
      <circle cx="450" cy="240" r="10" class="node"/>
    </g>

    <!-- Hidden Layer 3 -->
    <text x="650" y="-10" class="layer-label" text-anchor="middle">HIDDEN_3</text>
    <g id="hidden-layer-3">
      <path d="M 650 30 L 850 100" class="conn-line"/>
      <path d="M 650 30 L 850 200" class="conn-line"/>

      <path d="M 650 150 L 850 100" class="conn-line"/>
      <path d="M 650 150 L 850 200" class="conn-line"/>
      <path d="M 650 150 L 850 100" class="data-flow"/>

      <path d="M 650 270 L 850 100" class="conn-line"/>
      <path d="M 650 270 L 850 200" class="conn-line"/>
      <path d="M 650 270 L 850 200" class="data-flow-2"/>

      <circle cx="650" cy="30" r="10" class="node"/>
      <circle cx="650" cy="150" r="10" class="node node-active-2"/>
      <circle cx="650" cy="270" r="10" class="node"/>
    </g>

    <!-- Output Layer -->
    <text x="850" y="-10" class="layer-label" text-anchor="middle">OUTPUT</text>
    <g id="output-layer">
      <!-- Glow behind active output -->
      <circle cx="850" cy="100" r="25" fill="#00FFFF" opacity="0.1" filter="url(#glow-heavy)"/>
      <circle cx="850" cy="100" r="12" fill="#00FFFF" filter="url(#glow)"/>
      <circle cx="850" cy="200" r="10" class="node"/>
      
      <text x="880" y="105" font-family="'Fira Code', monospace" font-size="14" fill="#00FFFF" font-weight="bold">p(x)=0.98</text>
      <text x="880" y="205" font-family="'Fira Code', monospace" font-size="14" fill="#6272a4">p(x)=0.02</text>
    </g>

  </g>
</svg>