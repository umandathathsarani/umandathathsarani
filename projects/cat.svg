<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14142b"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="card-hover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e40"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    
    <linearGradient id="badge-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffb86c"/>
      <stop offset="100%" stop-color="#ff5e62"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <style>
    .card { transition: all 0.3s ease; transform-origin: center; cursor: pointer; }
    .card:hover { transform: scale(1.02); filter: drop-shadow(0 10px 15px rgba(255, 184, 108, 0.2)); }
    .card:hover .card-bg-rect { fill: url(#card-hover); stroke: #ffb86c; }
    
    .title { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: bold; fill: #FFFFFF; }
    .desc { font-family: 'Inter', sans-serif; font-size: 12px; fill: #a5b4fc; }
    .feature { font-family: 'Inter', sans-serif; font-size: 11px; fill: #8be9fd; }
    .badge-text { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: bold; fill: #FFFFFF; }
    .btn-text { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: bold; fill: #14142b; }
    .btn-outline-text { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: bold; fill: #FFFFFF; }
  </style>

  <g class="card">
    <rect x="5" y="5" width="390" height="240" rx="12" fill="url(#card-bg)" stroke="#ffb86c" stroke-width="1.5" class="card-bg-rect" filter="url(#shadow)"/>
    
    <!-- Thumbnail Area -->
    <rect x="5" y="5" width="390" height="70" rx="12" fill="rgba(255, 184, 108, 0.15)" style="border-bottom-left-radius:0; border-bottom-right-radius:0;"/>
    
    <!-- Icon representing a cat/pet -->
    <circle cx="50" cy="40" r="15" fill="url(#badge-bg)" filter="url(#glow)"/>
    <path d="M 38 28 L 45 35 L 35 38 Z" fill="url(#badge-bg)"/>
    <path d="M 62 28 L 55 35 L 65 38 Z" fill="url(#badge-bg)"/>

    <!-- Badges -->
    <g transform="translate(290, 15)">
      <rect x="0" y="0" width="90" height="20" rx="10" fill="rgba(0, 255, 135, 0.2)" stroke="#00FF87" stroke-width="1"/>
      <circle cx="10" cy="10" r="3" fill="#00FF87"/>
      <text x="20" y="14" class="badge-text" fill="#00FF87">ACTIVE</text>
    </g>

    <!-- Content -->
    <text x="20" y="100" class="title">Pet Breed Identifier</text>
    <text x="20" y="125" class="desc">A lightweight vision model optimized for</text>
    <text x="20" y="140" class="desc">identifying 120+ cat and dog breeds.</text>

    <!-- Tech Stack -->
    <g transform="translate(20, 160)">
      <rect x="0" y="0" width="70" height="20" rx="4" fill="rgba(123, 104, 238, 0.2)"/>
      <text x="35" y="14" class="badge-text" text-anchor="middle">PyTorch</text>
      
      <rect x="80" y="0" width="80" height="20" rx="4" fill="rgba(0, 255, 255, 0.2)"/>
      <text x="120" y="14" class="badge-text" text-anchor="middle">MobileNetV2</text>

      <rect x="170" y="0" width="60" height="20" rx="4" fill="rgba(255, 184, 108, 0.2)"/>
      <text x="200" y="14" class="badge-text" text-anchor="middle">Flask</text>
    </g>

    <!-- Key Feature -->
    <circle cx="25" cy="205" r="3" fill="#8be9fd"/>
    <text x="35" y="209" class="feature">Edge deployment ready</text>

    <!-- Buttons -->
    <g transform="translate(220, 200)">
      <rect x="0" y="0" width="75" height="26" rx="4" fill="rgba(255, 255, 255, 0.1)" stroke="rgba(255, 255, 255, 0.3)"/>
      <text x="37.5" y="17" class="btn-outline-text" text-anchor="middle">GitHub</text>

      <rect x="85" y="0" width="75" height="26" rx="4" fill="url(#badge-bg)"/>
      <text x="122.5" y="17" class="btn-text" text-anchor="middle">Demo ↗</text>
    </g>
  </g>
</svg>